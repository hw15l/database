server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/paper_vision?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterAccess=600s
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
      resolve-lazily: true

mybatis-plus:
  type-aliases-package: com.papervision.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:PaperVision2024SecretKeyForJwtTokenGenerationMustBeLongEnough}
  expiration: 86400000

python:
  service:
    url: ${PYTHON_SERVICE_URL:http://localhost:5002}

file:
  upload:
    path: ./uploads/
